/* ═══ MATCH ALGO ═══ */
function calcMatch(job, wp) {
  if(!wp.types||!wp.types.length) return {total:0, dims:{}};
  const overlap = job.types.filter(t=>wp.types.includes(t));
  const typeScore = overlap.length>0 ? Math.min(35,Math.round(overlap.length/job.types.length*35)) : 0;
  const cityOk = (wp.workCities||[]).includes(job.city)||(wp.currentCity===job.city);
  const cityScore = cityOk?25:0;
  const expScore = (wp.experience||0)>=3?20:(wp.experience||0)>=1?12:5;
  const payScore = job.payRate>=(wp.payExpect||0)?15:job.payRate>=(wp.payExpect||0)-8?10:5;
  const vehicleScore = wp.hasVehicle?5:3;
  const total = typeScore+cityScore+expScore+payScore+vehicleScore;
  return {
    total, overlap,
    dims:{
      type:{score:typeScore,max:35,label:"工种吻合",match:typeScore>=28},
      city:{score:cityScore,max:25,label:"城市匹配",match:cityScore>=20},
      exp:{score:expScore,max:20,label:"经验满足",match:expScore>=16},
      pay:{score:payScore,max:15,label:"薪资匹配",match:payScore>=12},
      vehicle:{score:vehicleScore,max:5,label:"有交通工具",match:wp.hasVehicle},
    }
  };
}
function gsc(s){return s>=80?{h:"#1a6b3c",cls:"high"}:s>=60?{h:"#1a4a8c",cls:"mid"}:{h:"#f5a623",cls:"low"};}

/* ═══ TINY HELPERS ═══ */
function div(cls, children, extra) {
  return e('div', Object.assign({className:cls||''}, extra||{}), ...(Array.isArray(children)?children:[children]));
}
function txt(tag, cls, content, extra) {
  return e(tag, Object.assign({className:cls||''}, extra||{}), content);
}

function StarsDisplay({score, size=12}) {
  return e('div', {style:{display:'flex',gap:2}},
    ...[1,2,3,4,5].map(i => e('span',{key:i,style:{fontSize:size,color:i<=Math.round(score)?'#f5a623':'#d4cfc4'}},'★'))
  );
}

function ScoreRing({score}) {
  const c = gsc(score), r=26, ci=2*Math.PI*r, d=(score/100)*ci;
  return e('div',{className:'ring'},
    e('svg',{width:64,height:64,viewBox:'0 0 64 64',className:'ring-svg'},
      e('circle',{cx:32,cy:32,r,fill:'none',stroke:'var(--bd)',strokeWidth:4.5}),
      e('circle',{cx:32,cy:32,r,fill:'none',stroke:c.h,strokeWidth:4.5,strokeDasharray:`${d} ${ci-d}`,strokeLinecap:'round'})
    ),
    e('div',{className:'ring-inner'},
      e('span',{className:'ring-num',style:{color:c.h}},score),
      e('span',{className:'ring-lbl'},'匹配分')
    )
  );
}

/* ════════════════════════════
   1. MATCH PAGE
════════════════════════════ */
function MatchPage({profile, onGoProfile}) {
  const [sort, setSort] = useState('匹配度');
  const [sel, setSel] = useState(null);
  const [spin, setSpin] = useState(false);

  const scored = JOBS_DB.map(j => ({...j, mr: calcMatch(j, profile)}));
  const sorted = [...scored].sort((a,b) =>
    sort==='匹配度'?b.mr.total-a.mr.total:sort==='薪资最高'?b.payRate-a.payRate:b.rating-a.rating
  );
  const top = sorted.filter(j=>j.mr.total>=45).slice(0,5);
  const rest = sorted.filter(j=>j.mr.total<45).slice(0,3);
  const noProfile = !profile.types||!profile.types.length;

  const ScoreBar = ({score}) => {
    const c = gsc(score);
    const fc = c.cls==='high'?'fill-h':c.cls==='mid'?'fill-m':'fill-l';
    const nc = c.cls==='high'?'num-high':c.cls==='mid'?'num-mid':'num-low';
    return e('div',{className:'ms-row'},
      e('span',{className:'ms-lbl'},'综合匹配'),
      e('div',{className:'ms-bar'},e('div',{className:`ms-fill ${fc}`,style:{width:`${score}%`}})),
      e('span',{className:`ms-num ${nc}`},`${score}%`)
    );
  };

  return e('div',{className:'page'},
    /* Hero */
    e('div',{className:'hero',style:{background:'var(--tx)'}},
      e('div',{className:'hero-r',style:{background:ZC[0]}}),
      e('h2',null,'大数据智能匹配',e('br'),e('span',{className:'hero-em'},'精准推荐'),'最佳机会'),
      e('p',null,'工种 · 城市 · 经验 · 薪资 · 交通工具 5维计算')
    ),

    /* Profile banner */
    noProfile && e('div',{className:'warn-banner'},'⚠️ 请前往「我的」填写工种和城市，匹配结果更精准'),

    e('div',{className:'prof-banner'},
      e('div',{className:'pb-av'},(profile.name||'我')[0]),
      e('div',{className:'pb-info'},
        e('div',{className:'pb-name'},profile.name||'（请填写姓名）'),
        e('div',{className:'pb-meta'},`${(profile.types||[]).join('·')||'未填工种'} · ${profile.experience||'?'}年 · ${profile.currentCity||'未填城市'}`),
        e('div',{className:'pb-chips'},
          ...(profile.workCities||[]).map(c=>e('span',{key:c,className:'pb-chip'},`📍${c}`)),
          profile.payExpect&&e('span',{className:'pb-chip'},`💰$${profile.payExpect}/${profile.payUnit||'时'}`)
        )
      ),
      e('button',{className:'pb-edit',onClick:onGoProfile},'编辑 ›')
    ),

    /* Algo strip */
    e('div',{className:'algo-strip'},
      e('span',{style:{fontSize:16}},'🤖'),
      e('div',{className:'algo-txt'},e('b',null,'智能匹配算法'),': 工种(35)+城市(25)+经验(20)+薪资(15)+交通(5)'),
      e('button',{className:'algo-btn',onClick:()=>{setSpin(true);setTimeout(()=>setSpin(false),1000);}},
        spin?'⟳':'刷新')
    ),

    /* Sort */
    e('div',{className:'sort-row'},
      e('span',{style:{fontSize:10,color:'var(--sub)',whiteSpace:'nowrap',flexShrink:0}},'排序：'),
      ...['匹配度','薪资最高','信誉最佳'].map(s=>
        e('button',{key:s,className:`sc ${sort===s?'on':''}`,onClick:()=>setSort(s)},s)
      )
    ),

    /* Top picks */
    top.length>0 && e('div',{className:'ai-label',style:{marginTop:8}},
      e('span',{className:'ai-badge'},'🎯 AI优选'),
      e('span',{className:'ai-desc'},`为您筛选 ${top.length} 个最佳职位`)

/* ── PUNCH HELPERS ── */
function _savep(){try{localStorage.setItem('__gj_p__',JSON.stringify(_MEM.punches));}catch(e){}}
function _wklabel(ds){
  var d=new Date(ds),day=d.getDay(),adj=(day-3+7)%7;
  var ws=new Date(d);ws.setDate(d.getDate()-adj);
  var we=new Date(ws);we.setDate(ws.getDate()+6);
  var f=function(x){return (x.getMonth()+1)+'/'+x.getDate();};
  return f(ws)+'—'+f(we);
}
function _weeksum(){
  var ns=['张建国','刘大明','王建华'],td=new Date().toISOString().slice(0,10),wk=_wklabel(td);
  return ns.map(function(n){
    var rs=(_MEM.punches[n]||[]).filter(function(r){return _wklabel(r.date)===wk;});
    return {name:n,hrs:rs.reduce(function(a,r){return a+(r.hours||0);},0),days:rs.length};
  });
}
function _exportcsv(){
  var ns=['张建国','刘大明','王建华'],td=new Date().toISOString().slice(0,10);
  var wkmap={};
  ns.forEach(function(n){(_MEM.punches[n]||[]).forEach(function(r){wkmap[_wklabel(r.date)]=1;});});
  var wks=Object.keys(wkmap).sort(),rows=[];
  rows.push(['工匠通工时报表']);
  rows.push(['导出时间',new Date().toLocaleString('zh-CN')]);
  rows.push(['周期','每周三至下周二']);
  rows.push([]);
  rows.push(['姓名','总工时(h)'].concat(wks).concat(['打卡天数']));
  ns.forEach(function(n){
    var wm={};
    (_MEM.punches[n]||[]).forEach(function(r){var wk=_wklabel(r.date);wm[wk]=(wm[wk]||0)+(r.hours||0);});
    var tot=Object.values(wm).reduce(function(a,v){return a+v;},0);
    var row=[n,tot.toFixed(1)];
    wks.forEach(function(wk){row.push((wm[wk]||0).toFixed(1));});
    row.push((_MEM.punches[n]||[]).length);
    rows.push(row);
  });
  rows.push([]);
  rows.push(['姓名','日期','上班','下班','工时(h)','纬度','经度']);
  ns.forEach(function(n){
    (_MEM.punches[n]||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(r){
      rows.push([n,r.date,r.inTime||'—',r.outTime||'进行中',(r.hours||0).toFixed(1),r.lat||'—',r.lng||'—']);
    });
  });
  var lines=rows.map(function(r){return r.map(function(c){return '"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');});
  var csv='\uFEFF'+lines.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='工时_'+td+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function CheckinPage({role, authUser}) {

  var todayStr = now.toISOString().slice(0,10);
  var timeStr = now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const [gpsStatus,setGpsStatus] = useState('init');
  const [gpsCoords,setGpsCoords] = useState(null);
  const [gpsMsg,setGpsMsg] = useState('点击按钮定位');

  var WDOTS=[{name:'张',x:'48%',y:'44%',color:'#d4420a',full:'张建国'},{name:'刘',x:'55%',y:'52%',color:'#1a6b3c',full:'刘大明'},{name:'王',x:'42%',y:'60%',color:'#1a4a8c',full:'王建华'}];

  useEffect(function(){
    var arr=(_MEM.punches&&_MEM.punches[wname])||[],rec=null;
    for(var i=0;i<arr.length;i++){if(arr[i].date===todayStr){rec=arr[i];break;}}

  function getGPS(){
    if(!navigator.geolocation){setGpsStatus('error');setGpsMsg('不支持GPS');return;}
    setGpsStatus('searching');setGpsMsg('定位中…');
    navigator.geolocation.getCurrentPosition(
      function(pos){
        setGpsStatus('ok');
        var lat=pos.coords.latitude.toFixed(5), lng=pos.coords.longitude.toFixed(5);
        setGpsCoords({lat:lat,lng:lng});
        setGpsMsg('±'+Math.round(pos.coords.accuracy)+'m');
        // Reverse geocode address
        fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&accept-language=zh')
          .then(function(r){return r.json();})
          .then(function(d){
            if(d&&d.address){
              var a=d.address;
              var short=(a.road||a.pedestrian||a.suburb||a.neighbourhood||'')
                       +(a.suburb?(' '+a.suburb):'')
                       +((a.city||a.town||a.county)?', '+(a.city||a.town||a.county):'');
              setAddress(short||d.display_name.split(',').slice(0,3).join(','));
            }
          }).catch(function(){});
        // Fetch nearby buildings/places via Overpass API (500m radius)
        var overpassQuery='[out:json][timeout:10];(node["name"]["amenity"](around:500,'+lat+','+lng+');node["name"]["building"](around:500,'+lat+','+lng+');node["name"]["shop"](around:500,'+lat+','+lng+');node["name"]["office"](around:500,'+lat+','+lng+');way["name"]["building"](around:500,'+lat+','+lng+'););out center 30;';
        fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:overpassQuery})
          .then(function(r){return r.json();})
          .then(function(d){
            if(!d||!d.elements)return;
            var seen={};
            var places=d.elements
              .filter(function(el){return el.tags&&el.tags.name;})
              .map(function(el){
                var elLat=el.lat||(el.center&&el.center.lat)||lat;
                var elLng=el.lon||(el.center&&el.center.lon)||lng;
                var dlat=elLat-parseFloat(lat), dlng=elLng-parseFloat(lng);
                var dist=Math.round(Math.sqrt(dlat*dlat+dlng*dlng)*111000);
                var type=el.tags.amenity||el.tags.building||el.tags.shop||el.tags.office||'建筑';
                var typeMap={'construction_site':'工地','offices':'办公楼','office':'办公楼','apartments':'公寓','residential':'住宅','warehouse':'仓库','industrial':'工厂','school':'学校','hospital':'医院','restaurant':'餐厅','shop':'商店','supermarket':'超市','convenience':'便利店','mall':'购物中心','yes':'建筑'};
                var typeZh=typeMap[type]||type;
                return {name:el.tags.name,dist:dist,type:typeZh,lat:elLat,lng:elLng};
              })
              .filter(function(p){
                if(seen[p.name])return false;
                seen[p.name]=1;return true;
              })
              .sort(function(a,b){return a.dist-b.dist;})
              .slice(0,12);
            setNearbyPlaces(places);
            if(places.length>0)setShowPlaces(true);
          }).catch(function(){});
      },
      function(err){
        setGpsStatus('error');
        setGpsMsg({1:'请允许位置权限',2:'无法获取位置',3:'定位超时'}[err.code]||'失败');
      },
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );

    var arr=(_MEM.punches&&_MEM.punches[wname])||[];

  var pad=function(n){return('0'+n).slice(-2);};

            e('iframe',{
              key:gpsCoords.lat+','+gpsCoords.lng,

                +'&layer=mapnik&marker='+gpsCoords.lat+','+gpsCoords.lng,

// _MEM defined at top
function getUsers() { return _MEM.users; }
function saveUsers(u) {
  _MEM.users = u;
  try { localStorage.setItem('__gj_users__', JSON.stringify(u)); } catch(e){}
}
function getCurrentUser() { return _MEM.current; }
function setCurrentUser(u) {
  _MEM.current = u;
  try { localStorage.setItem('__gj_current__', JSON.stringify(u)); } catch(e){}
}
function logout() {
  _MEM.current = null;
  try { localStorage.removeItem('__gj_current__'); } catch(e){}
}

/* ── REGISTER SCREEN ── */
function RegisterScreen({initRole, onBack, onDone}) {
  const [step, setStep] = useState(1); // 1=role, 2=info, 3=done
  const [role, setRole] = useState(initRole||'worker');
  const [form, setForm] = useState({name:'',phone:'',email:'',password:'',confirm:'',
    companyName:'',abn:''});
  const [err, setErr] = useState('');

  const setF = (k,v) => setForm(p=>({...p,[k]:v}));

  const goStep2 = () => { setErr(''); setStep(2); };

  const submit = () => {
    setErr('');
    if(role==='worker'){
      if(!form.name.trim()) return setErr('请填写姓名');
      if(!form.phone.trim()) return setErr('请填写手机号');
      if(!form.password || form.password.length < 6) return setErr('密码至少6位');
      if(form.password !== form.confirm) return setErr('两次密码不一致');
    } else {
      if(!form.companyName.trim()) return setErr('请填写公司名称');
      if(!form.phone.trim()) return setErr('请填写联系电话');
      if(!form.password || form.password.length < 6) return setErr('密码至少6位');
      if(form.password !== form.confirm) return setErr('两次密码不一致');
    }
    const users = getUsers();
    if(users.find(u=>u.phone===form.phone)) return setErr('该手机号已注册');
    const newUser = {
      id: Date.now(),
      role,
      phone: form.phone,
      password: form.password,
      name: role==='worker' ? form.name : form.companyName,
      email: form.email,
      abn: form.abn,
      createdAt: new Date().toISOString(),
      profile: role==='worker' ? {...DEFAULT_WORKER, name:form.name, phone:form.phone, email:form.email}
                                : {...DEFAULT_COMPANY, name:form.companyName, phone:form.phone},
    };
    users.push(newUser);
    saveUsers(users);
    setCurrentUser(newUser);
    setStep(3);
    setTimeout(()=>onDone(newUser), 1500);
  };

  const dots = [1,2,3].map((n,i)=>e('div',{key:n,className:`auth-dot ${step===n?'on':''}`}));

  return e('div',{className:'auth-wrap'},
    e('button',{className:'auth-back',onClick:step===1?onBack:()=>setStep(step-1)},
      '← '+(step===1?'返回':'上一步')),
    e('div',{className:'auth-step-dots'},...dots),

    step===1 && e('div',{className:'auth-card'},
      e('div',{className:'auth-title'},'选择注册身份'),
      e('div',{className:'auth-desc'},'请选择您的身份类型，注册后可在相应端使用全部功能'),
      e('div',{className:'role-cards'},
        e('div',{className:`role-card ${role==='worker'?'sel-w':''}`,onClick:()=>setRole('worker')},
          e('div',{className:'role-card-icon'},'👷'),
          e('div',{className:'role-card-name'},'工人注册'),
          e('div',{className:'role-card-desc'},'找工作·打卡·日志·信誉')
        ),
        e('div',{className:`role-card ${role==='company'?'sel-c':''}`,onClick:()=>setRole('company')},
          e('div',{className:'role-card-icon'},'🏢'),
          e('div',{className:'role-card-name'},'公司注册'),
          e('div',{className:'role-card-desc'},'招工·管理·任务·审查')
        )
      ),
      e('button',{className:`auth-btn ${role==='worker'?'auth-btn-w':'auth-btn-c'}`,onClick:goStep2},'下一步 →')
    ),

    step===2 && e('div',{className:'auth-card'},
      e('div',{className:'auth-title'},role==='worker'?'👷 工人注册':'🏢 公司注册'),
      e('div',{className:'auth-desc'},role==='worker'?'填写个人信息完成注册':'填写公司信息完成注册'),
      err && e('div',{className:'auth-err'},err),
      e('div',{className:'auth-form'},
        role==='worker'
          ? e('input',{className:'auth-input',placeholder:'真实姓名 *',value:form.name,onChange:ev=>setF('name',ev.target.value)})
          : e('input',{className:'auth-input',placeholder:'公司名称 *',value:form.companyName,onChange:ev=>setF('companyName',ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'手机号 *',type:'tel',value:form.phone,onChange:ev=>setF('phone',ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'邮箱（选填）',type:'email',value:form.email,onChange:ev=>setF('email',ev.target.value)}),
        role==='company' && e('input',{className:'auth-input',placeholder:'ABN / 营业执照号（选填）',value:form.abn,onChange:ev=>setF('abn',ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'设置密码（至少6位）*',type:'password',value:form.password,onChange:ev=>setF('password',ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'确认密码 *',type:'password',value:form.confirm,onChange:ev=>setF('confirm',ev.target.value)}),
        e('button',{className:`auth-btn ${role==='worker'?'auth-btn-w':'auth-btn-c'}`,onClick:submit},'完成注册')
      )
    ),

    step===3 && e('div',{className:'auth-card',style:{textAlign:'center'}},
      e('div',{style:{fontSize:48,marginBottom:12}},'🎉'),
      e('div',{className:'auth-title',style:{textAlign:'center',marginBottom:6}},'注册成功！'),
      e('div',{className:'auth-desc',style:{textAlign:'center'}},`欢迎加入工匠通，正在进入${role==='worker'?'工人':'公司'}端…`)
    )
  );
}

/* ── LOGIN SCREEN ── */
function LoginScreen({onBack, onDone}) {
  const [phone, setPhone] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');

  const submit = () => {
    setErr('');
    if(!phone.trim()) return setErr('请填写手机号');
    if(!password) return setErr('请填写密码');
    const users = getUsers();
    const user = users.find(u=>u.phone===phone && u.password===password);
    if(!user) return setErr('手机号或密码错误');
    setCurrentUser(user);
    onDone(user);
  };

  // Demo login shortcut
  const demoLogin = (role) => {
    const users = getUsers();
    let demo = users.find(u=>u.phone===(role==='worker'?'demo_worker':'demo_company'));
    if(!demo){
      demo = {
        id: role==='worker'?-1:-2,
        role,
        phone: role==='worker'?'demo_worker':'demo_company',
        password:'demo',
        name: role==='worker'?'张建国':'Pacific Build Group',
        profile: role==='worker'?{...DEFAULT_WORKER}:{...DEFAULT_COMPANY},
      };
      users.push(demo);
      saveUsers(users);
    }
    setCurrentUser(demo);
    onDone(demo);
  };

  return e('div',{className:'auth-wrap'},
    e('button',{className:'auth-back',onClick:onBack},'← 返回'),
    e('div',{className:'auth-logo',style:{fontSize:36,marginBottom:4}},'工',e('b',null,'匠'),'通'),
    e('div',{className:'auth-sub',style:{marginBottom:24}},'登录账号'),
    e('div',{className:'auth-card'},
      e('div',{className:'auth-title'},'账号登录'),
      e('div',{className:'auth-desc'},'使用注册时的手机号和密码登录'),
      err && e('div',{className:'auth-err'},err),
      e('div',{className:'auth-form'},
        e('input',{className:'auth-input',placeholder:'手机号',type:'tel',value:phone,onChange:ev=>setPhone(ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'密码',type:'password',value:password,onChange:ev=>setPassword(ev.target.value)}),
        e('button',{className:'auth-btn auth-btn-c',onClick:submit},'登录')
      ),
      e('div',{className:'auth-divider'},e('span',null,'快速体验')),
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
        e('button',{className:'auth-btn',style:{background:'#fff3ee',color:'var(--r)',fontSize:12},onClick:()=>demoLogin('worker')},'👷 工人演示'),
        e('button',{className:'auth-btn',style:{background:'#e8f0ff',color:'var(--b)',fontSize:12},onClick:()=>demoLogin('company')},'🏢 公司演示')
      )
    )
  );
}

  {key:'match',icon:'🎯',label:'找工作'},
  {key:'checkin',icon:'📍',label:'签到'},
  {key:'diary',icon:'📝',label:'日志'},
  {key:'rating',icon:'⭐',label:'信誉'},
  {key:'profile',icon:'👤',label:'我的'},
];
const TABS_COMPANY = [
  {key:'checkin',icon:'📍',label:'工人位置'},
  {key:'diary',icon:'📝',label:'项目管理'},
  {key:'rating',icon:'⭐',label:'信誉'},
  {key:'profile',icon:'👤',label:'公司资料'},
];

function App() {
  // Auth state
  const [authUser, setAuthUser] = useState(()=>{
    try { return getCurrentUser(); } catch(e){ return null; }
  });
  const [authScreen, setAuthScreen] = useState('welcome'); // welcome|login|register
  const [initRole, setInitRole] = useState(null);

  // App state
  const [tab, setTab] = useState('match');
  const [workerProfile, setWorkerProfile] = useState(DEFAULT_WORKER);
  const [companyProfile, setCompanyProfile] = useState(DEFAULT_COMPANY);

  useEffect(() => {
    const splash = document.getElementById('splash');
    if(splash) {
      splash.style.opacity = '0';
      setTimeout(() => { if(splash.parentNode) splash.parentNode.removeChild(splash); }, 400);
    }
  }, []);

  // Sync profile from auth user
  useEffect(()=>{
    if(authUser){
      if(authUser.role==='worker' && authUser.profile) setWorkerProfile(authUser.profile);
      if(authUser.role==='company' && authUser.profile) setCompanyProfile(authUser.profile);
      // Set default tab based on role
      setTab(authUser.role==='company' ? 'checkin' : 'match');
    }
  },[authUser]);

  const handleAuthDone = (user) => {
    setAuthUser(user);
  };

  const handleLogout = () => {
    logout();
    setAuthUser(null);
    setAuthScreen('welcome');
    setTab('match');
  };

  // Save profile changes back to user record
  const handleSetWorkerProfile = (p) => {
    setWorkerProfile(p);
    if(authUser){ const u={...authUser,profile:p}; setCurrentUser(u); setAuthUser(u); }
  };
  const handleSetCompanyProfile = (p) => {
    setCompanyProfile(p);
    if(authUser){ const u={...authUser,profile:p}; setCurrentUser(u); setAuthUser(u); }
  };

  // ── AUTH SCREENS ──
  if(!authUser) {
    if(authScreen==='welcome') return e('div',null,
      e('style',null,AUTH_CSS),
      e(WelcomeScreen,{
        onLogin:()=>setAuthScreen('login'),
        onRegister:(r)=>{setInitRole(r);setAuthScreen('register');}
      })
    );
    if(authScreen==='login') return e('div',null,
      e('style',null,AUTH_CSS),
      e(LoginScreen,{
        onBack:()=>setAuthScreen('welcome'),
        onDone:handleAuthDone
      })
    );
    if(authScreen==='register') return e('div',null,
      e('style',null,AUTH_CSS),
      e(RegisterScreen,{
        initRole,
        onBack:()=>setAuthScreen('welcome'),
        onDone:handleAuthDone
      })
    );
  }

  // ── MAIN APP ──
  const role = authUser ? authUser.role : 'worker';
  const isWorker = role === 'worker';
  const TABS = isWorker ? TABS_WORKER : TABS_COMPANY;

  // Ensure tab is valid for current role
  const validTab = TABS.find(t=>t.key===tab) ? tab : TABS[0].key;

  // Safety: if authUser somehow null here, return welcome
  if(!authUser) return e('div',null,e('style',null,AUTH_CSS),e(WelcomeScreen,{
    onLogin:()=>setAuthScreen('login'),
    onRegister:(r)=>{setInitRole(r);setAuthScreen('register');}
  }));

  const pages = {
    match:   e(MatchPage,   {profile:workerProfile, onGoProfile:()=>setTab('profile')}),
    checkin: e(CheckinPage, {role, authUser}),
    diary:   e(DiaryPage,   {role}),
    rating:  e(RatingPage,  {role}),
    profile: e(ProfilePage, {
      profile:workerProfile, setProfile:handleSetWorkerProfile,
      companyProfile, setCompanyProfile:handleSetCompanyProfile,
      role, setRole:()=>{},
      onLogout:handleLogout,
      authUser,
    }),
  };

  const avatarName = (authUser && authUser.name ? authUser.name : '我')[0];

  return e('div', {className:'app'},
    e('style', null, CSS),
    e('style', null, AUTH_CSS),
    e('div', {className:'topbar'},
      e('div', null,
        e('div', {className:'logo'}, '工', e('span',{className:'logo-r'},'匠'), '通'),
        e('div', {className:'logo-sub'}, isWorker?'工人端 — 找工作·签到·日志':'公司端 — 管理·任务·招工')
      ),
      e('div', {className:'topbar-right'},
        e('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1}},
          e('div',{className:`role-pill ${isWorker?'rp-w':'rp-c'}`,style:{cursor:'default'}},
            isWorker?'👷 工人':'🏢 公司'),
          e('div',{style:{fontSize:9,color:'var(--sub)',maxWidth:80,textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
            authUser.name)
        ),
        e('div',{className:'avatar',style:{background:isWorker?'#d4420a':'#1a4a8c',cursor:'pointer'},
          onClick:()=>setTab('profile')},avatarName)
      )
    ),
    pages[validTab],
    e('div', {className:'bottom-nav'},
      ...TABS.map(t =>
        e('button', {key:t.key, className:`nb ${validTab===t.key?'on':''}`, onClick:()=>setTab(t.key)},
          e('span', {className:'nb-icon'}, t.icon),
          t.label
        )
      )
    )
  );
}

// Global error handler to prevent black screen
window.addEventListener('error', function(ev){
  console.error('App error:', ev.error);
});
window.addEventListener('unhandledrejection', function(ev){
  console.error('Unhandled promise:', ev.reason);
});
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>

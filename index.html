function _wklabel(ds){
  var d=new Date(ds),day=d.getDay(),adj=(day-3+7)%7;
  var ws=new Date(d);ws.setDate(d.getDate()-adj);
  var we=new Date(ws);we.setDate(ws.getDate()+6);
  var f=function(x){return (x.getMonth()+1)+'/'+x.getDate();};
  return f(ws)+'—'+f(we);
}
function _weeksum(){
  var ns=['张建国','刘大明','王建华'],td=new Date().toISOString().slice(0,10),wk=_wklabel(td);
  return ns.map(function(n){
    var rs=(_MEM.punches[n]||[]).filter(function(r){return _wklabel(r.date)===wk;});
    return {name:n,hrs:rs.reduce(function(a,r){return a+(r.hours||0);},0),days:rs.length};
  });
}
function _exportcsv(){
  var ns=['张建国','刘大明','王建华'],td=new Date().toISOString().slice(0,10);
  var wkmap={},rows=[];
  ns.forEach(function(n){(_MEM.punches[n]||[]).forEach(function(r){wkmap[_wklabel(r.date)]=1;});});
  var wks=Object.keys(wkmap).sort();
  rows.push(['工匠通工时报表'],['导出',new Date().toLocaleString('zh-CN')],[]);
  rows.push(['姓名','总工时'].concat(wks).concat(['天数']));
  ns.forEach(function(n){
    var wm={};
    (_MEM.punches[n]||[]).forEach(function(r){var wk=_wklabel(r.date);wm[wk]=(wm[wk]||0)+(r.hours||0);});
    var tot=Object.values(wm).reduce(function(a,v){return a+v;},0);
    var row=[n,tot.toFixed(1)];wks.forEach(function(wk){row.push((wm[wk]||0).toFixed(1));});
    row.push((_MEM.punches[n]||[]).length);rows.push(row);
  });
  rows.push([],['姓名','日期','上班','下班','工时','纬度','经度']);
  ns.forEach(function(n){
    (_MEM.punches[n]||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(r){
      rows.push([n,r.date,r.inTime||'—',r.outTime||'进行中',(r.hours||0).toFixed(1),r.lat||'—',r.lng||'—']);
    });
  });
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){return '"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');

  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='工时_'+td+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function calcMatch(job, wp) {
  if(!wp.types||!wp.types.length) return {total:0, dims:{}};
  const overlap = job.types.filter(t=>wp.types.includes(t));
  const typeScore = overlap.length>0 ? Math.min(35,Math.round(overlap.length/job.types.length*35)) : 0;
  const cityOk = (wp.workCities||[]).includes(job.city)||(wp.currentCity===job.city);
  const cityScore = cityOk?25:0;
  const expScore = (wp.experience||0)>=3?20:(wp.experience||0)>=1?12:5;
  const payScore = job.payRate>=(wp.payExpect||0)?15:job.payRate>=(wp.payExpect||0)-8?10:5;
  const vehicleScore = wp.hasVehicle?5:3;
  const total = typeScore+cityScore+expScore+payScore+vehicleScore;
  return {
    total, overlap,
    dims:{
      type:{score:typeScore,max:35,label:"工种吻合",match:typeScore>=28},
      city:{score:cityScore,max:25,label:"城市匹配",match:cityScore>=20},
      exp:{score:expScore,max:20,label:"经验满足",match:expScore>=16},
      pay:{score:payScore,max:15,label:"薪资匹配",match:payScore>=12},
      vehicle:{score:vehicleScore,max:5,label:"有交通工具",match:wp.hasVehicle},
    }
  };
}
function gsc(s){return s>=80?{h:"#1a6b3c",cls:"high"}:s>=60?{h:"#1a4a8c",cls:"mid"}:{h:"#f5a623",cls:"low"};}

function StarsDisplay({score, size=12}) {
  return e('div', {style:{display:'flex',gap:2}},
    ...[1,2,3,4,5].map(i => e('span',{key:i,style:{fontSize:size,color:i<=Math.round(score)?'#f5a623':'#d4cfc4'}},'★'))
  );
}

function ScoreRing({score}) {
  const c = gsc(score), r=26, ci=2*Math.PI*r, d=(score/100)*ci;
  return e('div',{className:'ring'},
    e('svg',{width:64,height:64,viewBox:'0 0 64 64',className:'ring-svg'},
      e('circle',{cx:32,cy:32,r,fill:'none',stroke:'var(--bd)',strokeWidth:4.5}),
      e('circle',{cx:32,cy:32,r,fill:'none',stroke:c.h,strokeWidth:4.5,strokeDasharray:`${d} ${ci-d}`,strokeLinecap:'round'})
    ),
    e('div',{className:'ring-inner'},
      e('span',{className:'ring-num',style:{color:c.h}},score),
      e('span',{className:'ring-lbl'},'匹配分')
    )
  );
}

/* ════════════════════════════

════════════════════════════ */
function MatchPage({profile, onGoProfile}) {
  const [sort, setSort] = useState('匹配度');
  const [sel, setSel] = useState(null);
  const [spin, setSpin] = useState(false);

  const scored = JOBS_DB.map(j => ({...j, mr: calcMatch(j, profile)}));
  const sorted = [...scored].sort((a,b) =>
    sort==='匹配度'?b.mr.total-a.mr.total:sort==='薪资最高'?b.payRate-a.payRate:b.rating-a.rating
  );
  const top = sorted.filter(j=>j.mr.total>=45).slice(0,5);
  const rest = sorted.filter(j=>j.mr.total<45).slice(0,3);
  const noProfile = !profile.types||!profile.types.length;

  const ScoreBar = ({score}) => {
    const c = gsc(score);
    const fc = c.cls==='high'?'fill-h':c.cls==='mid'?'fill-m':'fill-l';
    const nc = c.cls==='high'?'num-high':c.cls==='mid'?'num-mid':'num-low';
    return e('div',{className:'ms-row'},
      e('span',{className:'ms-lbl'},'综合匹配'),
      e('div',{className:'ms-bar'},e('div',{className:`ms-fill ${fc}`,style:{width:`${score}%`}})),
      e('span',{className:`ms-num ${nc}`},`${score}%`)
    );
  };

  return e('div',{className:'page'},
    /* Hero */
    e('div',{className:'hero',style:{background:'var(--tx)'}},
      e('div',{className:'hero-r',style:{background:ZC[0]}}),
      e('h2',null,'大数据智能匹配',e('br'),e('span',{className:'hero-em'},'精准推荐'),'最佳机会'),
      e('p',null,'工种 · 城市 · 经验 · 薪资 · 交通工具 5维计算')
    ),

    /* Profile banner */
    noProfile && e('div',{className:'warn-banner'},'⚠️ 请前往「我的」填写工种和城市，匹配结果更精准'),

    e('div',{className:'prof-banner'},
      e('div',{className:'pb-av'},(profile.name||'我')[0]),
      e('div',{className:'pb-info'},
        e('div',{className:'pb-name'},profile.name||'（请填写姓名）'),
        e('div',{className:'pb-meta'},`${(profile.types||[]).join('·')||'未填工种'} · ${profile.experience||'?'}年 · ${profile.currentCity||'未填城市'}`),
        e('div',{className:'pb-chips'},
          ...(profile.workCities||[]).map(c=>e('span',{key:c,className:'pb-chip'},`📍${c}`)),
          profile.payExpect&&e('span',{className:'pb-chip'},`💰$${profile.payExpect}/${profile.payUnit||'时'}`)
        )
      ),
      e('button',{className:'pb-edit',onClick:onGoProfile},'编辑 ›')
    ),

    /* Algo strip */
    e('div',{className:'algo-strip'},
      e('span',{style:{fontSize:16}},'🤖'),
      e('div',{className:'algo-txt'},e('b',null,'智能匹配算法'),': 工种(35)+城市(25)+经验(20)+薪资(15)+交通(5)'),
      e('button',{className:'algo-btn',onClick:()=>{setSpin(true);setTimeout(()=>setSpin(false),1000);}},
        spin?'⟳':'刷新')
    ),

    /* Sort */
    e('div',{className:'sort-row'},
      e('span',{style:{fontSize:10,color:'var(--sub)',whiteSpace:'nowrap',flexShrink:0}},'排序：'),
      ...['匹配度','薪资最高','信誉最佳'].map(s=>
        e('button',{key:s,className:`sc ${sort===s?'on':''}`,onClick:()=>setSort(s)},s)
      )
    ),

    /* Top picks */
    top.length>0 && e('div',{className:'ai-label',style:{marginTop:8}},
      e('span',{className:'ai-badge'},'🎯 AI优选'),
      e('span',{className:'ai-desc'},`为您筛选 ${top.length} 个最佳职位`)
    ),

    top.length===0
      ? e('div',{className:'card',style:{margin:'10px 16px'}},
          e('div',{style:{textAlign:'center',padding:'36px 20px',color:'var(--sub)'}},
            e('div',{style:{fontSize:44,marginBottom:10}},'🔍'),
            e('div',{style:{fontSize:13,lineHeight:1.6}},'暂无高匹配职位，请完善资料'),
            e('button',{style:{marginTop:14,background:'var(--b)',color:'#fff',border:'none',padding:'9px 22px',borderRadius:8,fontSize:12,fontWeight:700},onClick:onGoProfile},'完善资料')
          )
        )
      : e('div',{className:'card',style:{margin:'0 16px'}},
          ...top.map((job,idx)=>
            e('div',{key:job.id,className:'li',onClick:()=>setSel(job)},
              e('div',{className:`rank ${['rk1','rk2','rk3','rkn'][Math.min(idx,3)]}`},
                idx===0?'①':idx===1?'②':idx===2?'③':idx+1),
              e('div',{className:'li-top'},
                e('div',{className:'li-company'},job.company),
                e('div',{className:'li-pay'},`A$${job.payRate}/${job.payUnit}`)
              ),
              e('div',{className:'li-sub'},`${job.city} · ${job.types.join('/')} · ⭐${job.rating}`),

              ScoreBar({score:job.mr.total}),
              e('div',{className:'dims'},
                ...Object.values(job.mr.dims).map(d=>
                  e('div',{key:d.label,className:'dim'},
                    e('div',{className:'dim-dot',style:{background:d.match?'var(--g)':'var(--bd2)'}}),
                    e('span',{style:{color:d.match?'var(--g)':'var(--sub)',fontWeight:d.match?700:400}},d.label)
                  )
                )
              )
            )
          )
        ),

    /* Rest */
    rest.length>0 && e('div',null,
      e('div',{style:{padding:'6px 16px 5px'}},e('span',{style:{fontSize:10,color:'var(--sub)'}},'其他职位（匹配度较低）')),
      e('div',{className:'card',style:{margin:'0 16px'}},
        ...rest.map(job=>
          e('div',{key:job.id,className:'li',style:{opacity:0.65},onClick:()=>setSel(job)},
            e('div',{className:'li-top'},
              e('div',{className:'li-company'},job.company),
              e('div',{className:'li-pay'},`A$${job.payRate}/${job.payUnit}`)
            ),
            e('div',{className:'li-sub'},`${job.city} · ${job.types.join('/')}`),
            e('div',{className:'ms-row'},
              e('span',{className:'ms-lbl'},'匹配度'),
              e('div',{className:'ms-bar'},e('div',{className:'ms-fill fill-l',style:{width:`${job.mr.total}%`}})),
              e('span',{className:'ms-num num-low'},`${job.mr.total}%`)
            )
          )
        )
      )
    ),

    /* Modal */
    sel && e('div',{className:'overlay',onClick:()=>setSel(null)},
      e('div',{className:'sheet',onClick:ev=>ev.stopPropagation()},
        e('div',{className:'sh-handle'}),
        e('div',{className:'sh-hd'},
          e('div',null,
            e('div',{className:'sh-title'},sel.company),
            e('div',{className:'sh-sub'},`${sel.city} · ⭐${sel.rating} · ${sel.reviews}条评价`)
          ),
          e('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}},
            e('div',{style:{fontSize:15,fontWeight:900,color:'var(--r)'}},`A$${sel.payRate}/${sel.payUnit}`),
            e('button',{className:'sh-close',onClick:()=>setSel(null)},'✕')
          )
        ),
        e('div',{className:'sh-sec'},
          e('div',{className:'sh-sec-title'},'AI 匹配分析'),
          e('div',{className:'ring-wrap'},
            ScoreRing({score:sel.mr.total}),
            e('div',{className:'ring-reason'},
              e('h4',null,sel.mr.total>=80?'🏆 高度吻合，强烈推荐！':sel.mr.total>=65?'✅ 匹配良好':'📋 基本符合'),
              e('p',null,(sel.mr.overlap||[]).length>0?`工种「${(sel.mr.overlap||[]).join('、')}」吻合，`:'',
                sel.mr.dims.city?.match?'地区匹配。':'地区不符，需通勤。')
            )
          ),
          e('div',{className:'dim-bars'},
            ...Object.values(sel.mr.dims).map(d=>
              e('div',{key:d.label},
                e('div',{className:'db-hd'},
                  e('span',{className:'db-name'},d.label),
                  e('span',{className:'db-val',style:{color:d.match?'var(--g)':'var(--sub)'}},`${d.score}/${d.max}分`)
                ),
                e('div',{className:'db-bar'},
                  e('div',{className:'db-fill',style:{width:`${d.score/d.max*100}%`,background:d.match?'var(--g)':'var(--bd2)'}})
                )
              )
            )
          )
        ),
        e('div',{className:'sh-sec'},
          e('div',{className:'sh-sec-title'},'职位描述'),
          e('div',{className:'tags',style:{marginBottom:8}},
            ...sel.types.map(t=>e('span',{key:t,className:'tag tag-b'},t)),
            ...sel.tags.map(t=>e('span',{key:t,className:'tag tag-r'},t))
          ),
          e('div',{style:{fontSize:12,color:'var(--sub)',lineHeight:1.6}},sel.desc),
          e('div',{style:{fontSize:12,marginTop:8}},`💰 A$${sel.payRate}/${sel.payUnit} · 结算：${sel.payDay}`)
        ),
        e('div',{className:'btn-row'},
          e('button',{className:'btn btn-s',onClick:()=>setSel(null)},'稍后再看'),
          e('button',{className:'btn btn-p',onClick:()=>{
            if(!_MEM.applications)_MEM.applications=[];
            var already = _MEM.applications.some(function(a){return a.jobId===sel.id && a.workerName===(profile&&profile.name||'工人');});
            if(!already){
              _MEM.applications.push({
                id:Date.now(), jobId:sel.id, companyName:sel.company,
                jobTitle:sel.title, workerName:(profile&&profile.name)||'工人',
                workerPhone:(profile&&profile.phone)||'', workerEmail:(profile&&profile.email)||'',
                workerType:(profile&&profile.types&&profile.types[0])||'',
                status:'pending', appliedAt:new Date().toISOString().slice(0,10)
              });
              _saveApps();
            }
            alert(already?'您已申请过该职位':'✅ 申请已提交，等待公司回复');
            setSel(null);
          }},'立即申请')
        )
      )
    )
  );
}

/* ════════════════════════════

function CheckinPage({role, authUser}) {
  var wname = (authUser&&authUser.name)?authUser.name:'张建国';
  var isCompany = role==='company';
  var todayStr = new Date().toISOString().slice(0,10);
  var now = new Date();
  var timeStr = now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const [gpsStatus,setGpsStatus] = useState('init');
  const [gpsCoords,setGpsCoords] = useState(null);
  const [gpsMsg,setGpsMsg] = useState('点击按钮定位');
  const [address,setAddress] = useState('');
  const [punchIn,setPunchIn] = useState(null);
  const [punchOut,setPunchOut] = useState(null);
  const [timer,setTimer] = useState(0);
  const [selW,setSelW] = useState(null);
  var WDOTS=[{name:'张',x:'48%',y:'44%',color:'#d4420a',full:'张建国'},{name:'刘',x:'55%',y:'52%',color:'#1a6b3c',full:'刘大明'},{name:'王',x:'42%',y:'60%',color:'#1a4a8c',full:'王建华'}];

  useEffect(function(){
    var arr=(_MEM.punches&&_MEM.punches[wname])||[],rec=null;
    for(var i=0;i<arr.length;i++){if(arr[i].date===todayStr){rec=arr[i];break;}}
    if(rec){setPunchIn(rec.inTime||null);if(rec.outTime)setPunchOut(rec.outTime);}
  },[wname]);

  useEffect(function(){
    if(!punchIn||punchOut)return;
    var iv=setInterval(function(){
      var p=punchIn.split(':').map(Number),n=new Date();
      setTimer(Math.max(0,(n.getHours()-p[0])*3600+(n.getMinutes()-p[1])*60+n.getSeconds()));
    },1000);
    return function(){clearInterval(iv);};
  },[punchIn,punchOut]);

  function getGPS(){
    if(!navigator.geolocation){setGpsStatus('error');setGpsMsg('不支持GPS');return;}
    setGpsStatus('searching');setGpsMsg('定位中…');
    navigator.geolocation.getCurrentPosition(
      function(pos){
        var lat=pos.coords.latitude.toFixed(5),lng=pos.coords.longitude.toFixed(5);
        setGpsStatus('ok');setGpsCoords({lat:lat,lng:lng});setGpsMsg('±'+Math.round(pos.coords.accuracy)+'m');
        fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&accept-language=zh')
          .then(function(r){return r.json();}).then(function(d){
            if(d&&d.address){var a=d.address;setAddress((a.road||a.suburb||'')+(a.city?', '+a.city:''));}
          }).catch(function(){});
      },
      function(err){setGpsStatus('error');setGpsMsg({1:'请允许位置权限',2:'无法获取位置',3:'定位超时'}[err.code]||'失败');},
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  }

  function doPunchIn(){
    var t=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    setPunchIn(t);
    if(!_MEM.punches)_MEM.punches={};
    if(!_MEM.punches[wname])_MEM.punches[wname]=[];
    var arr=_MEM.punches[wname],idx=-1;
    for(var i=0;i<arr.length;i++){if(arr[i].date===todayStr){idx=i;break;}}
    var rec={date:todayStr,inTime:t,outTime:null,hours:0,lat:gpsCoords?gpsCoords.lat:null,lng:gpsCoords?gpsCoords.lng:null};
    if(idx>=0)arr[idx]=rec;else arr.push(rec);
    _savep();
  }

  function doPunchOut(){
    var t=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    setPunchOut(t);
    var arr=(_MEM.punches&&_MEM.punches[wname])||[];
    for(var i=0;i<arr.length;i++){
      if(arr[i].date===todayStr){
        var ip=arr[i].inTime.split(':').map(Number),op=t.split(':').map(Number);
        arr[i].outTime=t;arr[i].hours=Math.max(0,parseFloat(((op[0]*60+op[1]-ip[0]*60-ip[1])/60).toFixed(1)));
        break;
      }
    }
    _savep();
  }

  var pad=function(n){return('0'+n).slice(-2);};
  var hh=Math.floor(timer/3600),mi=Math.floor((timer%3600)/60),ss=timer%60;
  var tStr=(punchIn&&!punchOut)?(pad(hh)+':'+pad(mi)+':'+pad(ss)):null;
  var arr0=(_MEM.punches&&_MEM.punches[wname])||[],todayRec=null;
  for(var i=0;i<arr0.length;i++){if(arr0[i].date===todayStr){todayRec=arr0[i];break;}}
  var recent=arr0.slice().reverse().slice(0,7);
  var wksum=_weeksum();
  var ledC=gpsStatus==='ok'?'#2ecc71':gpsStatus==='searching'?'#f5a623':'#e74c3c';

  return e('div',{className:'page'},
    e('div',{className:'card',style:{margin:'14px 16px 0'}},
      e('div',{className:'map-box'},
        e('svg',{viewBox:'0 0 320 200',style:{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.18}},
          ...[20,60,100,140,180].map(function(y){return e('line',{key:y,x1:0,y1:y,x2:320,y2:y,stroke:'#2a6a2a',strokeWidth:0.7});}),
          ...[0,64,128,192,256,320].map(function(x){return e('line',{key:x,x1:x,y1:0,x2:x,y2:200,stroke:'#2a6a2a',strokeWidth:0.7});})
        ),
        e('div',{className:'gpsbadge'},
          e('div',{className:'gpsled',style:{background:ledC}}),
          e('span',null,gpsStatus==='ok'?('已定位 '+gpsMsg):gpsMsg)
        ),
        isCompany
          ? e('div',{style:{position:'absolute',inset:0}},
              WDOTS.map(function(w,i){return e('div',{key:i,onClick:function(){setSelW(w);},style:{position:'absolute',top:w.y,left:w.x,width:28,height:28,borderRadius:'50%',background:w.color,border:'2px solid #fff',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}},w.name);})
            )
          : e('div',{style:{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)'}},
              [{s:50,d:0},{s:70,d:0.5},{s:90,d:1}].map(function(p,i){return e('div',{key:i,className:'pulse-ring',style:{width:p.s,height:p.s,position:'absolute',top:'50%',left:'50%',animationDelay:p.d+'s'}});}),

function ProjForm({isEdit, projForm, setProjForm, onCancel, onSave, COLORS, ALL_WORKERS}) {
  const [addrSuggestions, setAddrSuggestions] = useState([]);
  const [addrLoading, setAddrLoading] = useState(false);
  const [showSugg, setShowSugg] = useState(false);
  // Local form state to prevent lag
  const [local, setLocal] = useState(projForm);
  const setF = (k,v) => setLocal(p=>({...p,[k]:v}));

  // Debounce address search
  const addrTimer = useRef(null);
  const searchAddr = (q) => {
    if(addrTimer.current) clearTimeout(addrTimer.current);
    if(!q || q.length < 3) { setAddrSuggestions([]); setShowSugg(false); return; }
    addrTimer.current = setTimeout(function(){
      setAddrLoading(true);
      fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=5&accept-language=zh')
        .then(function(r){return r.json();})
        .then(function(data){
          setAddrLoading(false);
          var suggestions = (data||[]).map(function(d){
            return {
              display: d.display_name.split(',').slice(0,3).join(','),
              full: d.display_name
            };
          });
          setAddrSuggestions(suggestions);
          setShowSugg(suggestions.length > 0);
        })
        .catch(function(){ setAddrLoading(false); });
    }, 400);
  };

  return e('div',{className:'pj-form'},
    e('div',{className:'pjf-title'},isEdit?'✏️ 修改项目信息':'➕ 新增项目'),
    e('input',{className:'pjf-in',placeholder:'项目名称 *',value:local.name||'',
      onChange:ev=>setF('name',ev.target.value)}),
    e('div',{style:{position:'relative',marginBottom:8}},
      e('input',{className:'pjf-in',style:{marginBottom:0},placeholder:'工地地址 * （开始输入自动搜索）',
        value:local.site||'',
        onChange:ev=>{setF('site',ev.target.value);searchAddr(ev.target.value);},
        onBlur:()=>setTimeout(function(){setShowSugg(false);},200)
      }),
      addrLoading&&e('div',{style:{position:'absolute',right:10,top:10,fontSize:11,color:'var(--sub)'}},'🔍'),
      showSugg&&addrSuggestions.length>0&&e('div',{style:{
        position:'absolute',top:'100%',left:0,right:0,background:'var(--sur)',
        border:'1px solid var(--bd)',borderRadius:8,zIndex:99,boxShadow:'var(--sh)',
        maxHeight:200,overflowY:'auto'
      }},
        addrSuggestions.map(function(s,i){
          return e('div',{key:i,
            onMouseDown:function(ev){ev.preventDefault();setF('site',s.display);setShowSugg(false);},
            style:{padding:'9px 12px',borderBottom:'1px solid var(--bd)',fontSize:12,cursor:'pointer',
                   color:'var(--tx)',lineHeight:1.4,transition:'background 0.1s'}},
            s.display
          );
        })
      )
    ),
    e('input',{className:'pjf-in',placeholder:'项目描述（选填）',value:local.desc||'',
      onChange:ev=>setF('desc',ev.target.value)}),
    e('span',{className:'pjf-label'},'项目颜色'),
    e('div',{className:'pjf-colors'},
      COLORS.map(function(c){
        return e('div',{key:c,className:'pjf-color',onClick:()=>setF('color',c),
          style:{background:c,border:local.color===c?'3px solid #1a1714':'3px solid transparent'}});
      })
    ),
    e('span',{className:'pjf-label'},'指派工人（可多选）'),
    e('div',{className:'pjf-workers'},
      ALL_WORKERS.map(function(w){
        var sel = (local.workers||[]).includes(w);
        return e('div',{key:w,className:'pjf-w',
          onClick:()=>setF('workers',sel?(local.workers||[]).filter(function(x){return x!==w;}):[...(local.workers||[]),w]),
          style:{background:sel?'var(--b)':'var(--s3)',color:sel?'#fff':'var(--sub)',border:'1px solid '+(sel?'var(--b)':'var(--bd2)')}
        },w);
      })
    ),
    e('div',{className:'pjf-foot'},
      e('button',{className:'pjf-cancel',onClick:onCancel},'取消'),
      e('button',{className:'pjf-ok',onClick:function(){
        if(!local.name||!local.name.trim()||!local.site||!local.site.trim())return;
        onSave(local);
      }},isEdit?'保存修改':'创建项目')
    )
  );
}

  `;

    e('div',{className:'pj-list'},

        }},e('span',null,'＋'),'新增项目')

      onSave:function(f){saveProjects(projects.map(p=>p.id===selProj.id?{...p,...f}:p));setView('list');}})
  );

  /* ── Detail View ── */
  if(view==='detail'&&proj) {
    const projTasks = getProjTasks(proj.id);

    return e('div',{className:'page'},

      e('div',{className:'pd-hd'},

        e('div',{className:'pd-site'},'📍 '+proj.site+(proj.desc?' · '+proj.desc:'')),
        e('div',{className:'pd-row'},
          [['工人',proj.workers.length],['任务',projTasks.length],['完成',done],['进行',projTasks.length-done]].map(([l,n])=>
            e('div',{key:l,className:'pd-st'},e('div',{className:'pd-sn'},n),e('div',{className:'pd-sl'},l))
          )
        )
      ),
      e('div',{style:{display:'flex',gap:8,padding:'10px 16px 0'}},
        e('button',{style:{flex:1,padding:8,borderRadius:8,border:'none',background:'#e8f0ff',color:'var(--b)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif"},
          onClick:()=>{setProjForm({name:proj.name,site:proj.site||'',desc:proj.desc||'',color:proj.color,workers:proj.workers||[]});setView('editProj');}},'✏️ 修改项目信息'),
        e('button',{style:{padding:'8px 12px',borderRadius:8,border:'none',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif",
          background:proj.status==='active'?'#fff0ec':'#e8f5ee',color:proj.status==='active'?'var(--r)':'var(--g)'},
          onClick:()=>saveProjects(projects.map(p=>p.id===proj.id?{...p,status:p.status==='active'?'done':'active'}:p))},

      ),
      e('div',{style:{padding:'0 16px'}},
        e('div',{style:{fontSize:11,fontWeight:700,color:'var(--sub)',letterSpacing:1,textTransform:'uppercase',margin:'14px 0 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}},

        ),
        showTaskForm&&e('div',{className:'atf',style:{marginBottom:10}},

            e('option',{value:''},'选择工作类型 *'),
            TASK_TYPES.map(o=>e('option',{key:o},o))

          e('input',{className:'atf-in',placeholder:'区域（如：A区外墙）',value:taskForm.area,onChange:ev=>setTaskForm(f=>({...f,area:ev.target.value}))}),
          e('div',{className:'atf-row'},

              proj.workers.map(w=>e('option',{key:w},w))

            e('input',{className:'atf-sel',placeholder:'截止时间',value:taskForm.dueTime,onChange:ev=>setTaskForm(f=>({...f,dueTime:ev.target.value}))})
          ),

          e('div',{className:'atf-foot'},
            e('button',{className:'atf-cancel',onClick:()=>{setShowTaskForm(false);setEditTaskId(null);}},'取消'),
            e('button',{className:'atf-ok',onClick:()=>{
              if(!taskForm.name)return;
              const newTasks = editTaskId
                ? projTasks.map(t=>t.id===editTaskId?{...t,...taskForm}:t)
                : [...projTasks,{id:Date.now(),...taskForm,done:false,color:proj.color}];
              setProjTasks(proj.id,newTasks);
              setShowTaskForm(false);setEditTaskId(null);
            }},editTaskId?'保存':'派发')
          )
        ),
        projTasks.length===0&&!showTaskForm&&e('div',{style:{padding:'12px 0',textAlign:'center',color:'var(--sub)',fontSize:12}},'暂无任务，点击上方派发'),
        projTasks.map(t=>e('div',{key:t.id,className:'ptask'},
          e('div',{className:'ptask-hd'},
            e('div',{className:'ptask-bar',style:{background:t.color||proj.color}}),
            e('div',{className:'ptask-info'},

              t.quota&&e('div',{className:'ptask-std'},'⚠️ '+t.quota)
            ),
            e('div',{className:'ptask-acts'},
              e('button',{className:'ptask-btn ptask-edit',onClick:()=>{setTaskForm({name:t.name,area:t.area||'',quota:t.quota||'',assignTo:t.assignTo||'',dueTime:t.dueTime||'18:00'});setEditTaskId(t.id);setShowTaskForm(true);}},'编辑'),
              e('button',{className:'ptask-btn',style:{background:t.done?'#e8f5ee':'#e8f0ff',color:t.done?'var(--g)':'var(--b)'},
                onClick:()=>{setProjTasks(proj.id,projTasks.map(x=>x.id===t.id?{...x,done:!x.done}:x));}},(t.done?'✅':'○')+' '+(t.done?'已完成':'标完成')),
              e('button',{className:'ptask-btn ptask-del',onClick:()=>setProjTasks(proj.id,projTasks.filter(x=>x.id!==t.id))},'删除')
            )
          ),
          e('div',{className:'ptask-ft'},
            e('span',{style:{color:'var(--sub)'}},'指派：',e('b',{style:{color:'var(--b)'}},t.assignTo||'未指派')),
            e('span',{style:{color:'var(--sub)'}},'截止 '+t.dueTime),
            t.done?e('span',{style:{marginLeft:'auto',fontSize:10,color:'var(--g)',fontWeight:700}},'✅ 已完成')
                  :e('span',{style:{marginLeft:'auto',fontSize:10,color:'var(--r)',fontWeight:600}},'⏳ 待完成')
          )
        ))
      ),
      e('div',{style:{padding:'0 16px 20px'}},
        e('div',{style:{fontSize:11,fontWeight:700,color:'var(--sub)',letterSpacing:1,textTransform:'uppercase',margin:'14px 0 8px'}},'📋 工人日志'),
        logs.length===0&&e('div',{style:{textAlign:'center',padding:16,color:'var(--sub)',fontSize:12}},'暂无日志'),
        logs.map(log=>{
          const done=log.tasks.filter(t=>t.done).length;
          const st=done===log.tasks.length?{l:'全部完成',c:'ws-ok'}:done>0?{l:'部分完成',c:'ws-pt'}:{l:'未完成',c:'ws-no'};
          return e('div',{key:log.id,className:'wlog'},
            e('div',{className:'wlog-hd'},
              e('div',{className:'wlog-av',style:{background:log.color}},log.worker[0]),
              e('div',{className:'wlog-name'},log.worker),
              e('span',{className:'wlog-date'},log.date),
              e('span',{className:'wlog-st '+st.c},st.l)
            ),
            e('div',{className:'wlog-body'},
              e('div',{className:'wlog-txt'},log.content),
              e('div',{className:'wlog-tasks'},
                log.tasks.map((t,i)=>e('div',{key:i,className:'wlog-ti'},
                  e('div',{className:'wlog-dot',style:{background:t.done?'var(--g)':'var(--r)'}}),
                  e('span',{style:{color:t.done?'var(--g)':'var(--r)',fontWeight:700}},t.done?'✓':'✗'),
                  e('span',null,t.name)
                ))
              )
            )
          );
        })
      )
    );
  }
  return e('div',{className:'page'},e('div',{style:{padding:20,color:'var(--sub)'}},'加载中…'));
}


/* ════════════════════════════
   4. RATING PAGE
════════════════════════════ */
function RatingPage({role}) {
  const tab = role==='worker' ? 'companies' : 'workers';
  const [ratingTarget, setRatingTarget] = useState(null);
  const [editingW, setEditingW] = useState(null);
  const [workerRatings, setWorkerRatings] = useState({});
  const [companyRatings, setCompanyRatings] = useState({});
  const [formDims, setFormDims] = useState({});
  const [formText, setFormText] = useState('');
  const [savedMsg, setSavedMsg] = useState('');

  const openRateCompany = c => { setFormDims(companyRatings[c.id]?.dims||{payPunctual:0,stability:0,environment:0,management:0}); setFormText(companyRatings[c.id]?.text||''); setRatingTarget(c); };
  const openRateWorker = w => { setFormDims(workerRatings[w.id]?.dims||{efficiency:0,attitude:0,reliability:0,skill:0}); setFormText(workerRatings[w.id]?.text||''); setEditingW(w); };
  const submitC = () => { setCompanyRatings(p=>({...p,[ratingTarget.id]:{dims:formDims,text:formText,date:new Date().toISOString().slice(0,10)}})); setSavedMsg(`已评价「${ratingTarget.name}」`); setRatingTarget(null); setTimeout(()=>setSavedMsg(''),2500); };
  const submitW = () => { setWorkerRatings(p=>({...p,[editingW.id]:{dims:formDims,text:formText,date:new Date().toISOString().slice(0,10)}})); setSavedMsg(`已评价「${editingW.name}」`); setEditingW(null); setTimeout(()=>setSavedMsg(''),2500); };
  const avgD = dims => { const v=Object.values(dims).filter(x=>x>0); return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):'—'; };

  const StarPicker = ({dimKey}) => e('div',{className:'star-row'},
    ...[1,2,3,4,5].map(n=>e('button',{key:n,className:'star-btn',onClick:()=>setFormDims(p=>({...p,[dimKey]:n}))},
      e('span',{style:{color:n<=(formDims[dimKey]||0)?'#f5a623':'#d4cfc4'}},'★')
    )),
    formDims[dimKey]>0&&e('span',{style:{fontSize:11,color:'var(--sub)',marginLeft:4}},['','很差','较差','一般','良好','非常好'][formDims[dimKey]])
  );

  return e('div',{className:'page'},
    e('div',{className:'rt-hero'},
      e('div',{className:'hero-r',style:{background:'#f5a623'}}),
      e('h2',null,'信誉评级系统',e('br'),e('span',{className:'hero-em'},'双向互信'),'用工生态'),
      e('p',null,'工人评公司 · 公司评工人 · 透明诚信')
    ),
    savedMsg&&e('div',{className:'success-bar'},`✅ ${savedMsg}`),
    e('div',{className:'sw'},
      e('button',{className:`sw-btn ${tab==='companies'?'on':''}`,onClick:()=>setTab('companies')},'🏢 公司评级'),
      e('button',{className:`sw-btn ${tab==='workers'?'on':''}`,onClick:()=>setTab('workers')},'👷 工人评级')
    ),

    tab==='companies'&&e('div',null,
      e('div',{className:'hint-y',style:{margin:'10px 16px 0'}},
        '⏰ 工人对公司的评价需在入职后第一周内（7天内）完成，逾期将无法评价。'),
      e('div',{className:'card',style:{margin:'8px 16px 0'}},
        ...COMPANIES_RATED.map(c=>{
          const myR=companyRatings[c.id], rated=!!myR, canRate=c.weeksPassed<=1;
          return e('div',{key:c.id,className:'rc'},
            e('div',{className:'rc-hd'},
              e('div',{className:'rc-av',style:{background:c.color}},c.name[0]),
              e('div',{className:'rc-info'},
                e('div',{className:'rc-name'},c.name),
                e('div',{className:'rc-desc'},c.type),
                e('div',{style:{display:'flex',gap:5,alignItems:'center',marginTop:3}},
                  StarsDisplay({score:rated?parseFloat(avgD(myR.dims)):c.overall,size:12}),
                  e('span',{style:{fontSize:11,fontFamily:'DM Mono,monospace',fontWeight:700}},rated?avgD(myR.dims):c.overall)
                )
              ),
              e('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}},
                e('span',{style:{fontSize:10,color:'var(--sub)'}},`${c.reviews}条评价`),
                canRate&&!rated?e('button',{style:{background:'var(--r)',color:'#fff',border:'none',padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:700},onClick:()=>openRateCompany(c)},'评价')
                :rated?e('button',{style:{background:'var(--g)',color:'#fff',border:'none',padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:700},onClick:()=>openRateCompany(c)},'修改')
                :e('span',{style:{fontSize:10,color:'var(--sub)',background:'var(--s3)',padding:'3px 7px',borderRadius:5}},'已过期')
              )
            ),
            rated?e('div',{style:{marginTop:8,padding:'8px 10px',background:'var(--s2)',borderRadius:7,border:'1px solid var(--bd)'}},
              e('div',{style:{fontSize:10,fontWeight:700,color:'var(--g)',marginBottom:5}},`✅ 我的评价（${myR.date}）`),
              e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}},
                ...COMPANY_DIMS.map(d=>e('div',{key:d.key,style:{fontSize:10,display:'flex',alignItems:'center',gap:3}},
                  d.icon,' ',e('span',{style:{color:'var(--sub)'}},`${d.label}：`),
                  e('span',{style:{fontWeight:700,color:'#f5a623'}},'★'.repeat(myR.dims[d.key]||0))
                ))
              ),
              myR.text&&e('div',{style:{fontSize:11,color:'var(--sub)',marginTop:5,lineHeight:1.4}},`"${myR.text}"`)
            ):e('div',null,
              e('div',{className:'rc-badges'},...c.badges.map((b,j)=>e('span',{key:j,className:`badge ${['bg-gold','bg-b','bg-g'][j%3]}`},b))),
              e('div',{className:'rc-review'},`"${c.review}"`)
            ),
            !canRate&&!rated&&e('div',{style:{marginTop:7,fontSize:10,color:'var(--sub)',background:'var(--s3)',padding:'6px 9px',borderRadius:6}},'⏰ 评价窗口已关闭（仅限入职第一周内）')
          );
        })
      )
    ),

    tab==='workers'&&e('div',null,
      e('div',{className:'hint-b',style:{margin:'10px 16px 0'}},
        '🔄 公司对工人的评价随时可以修改，包含工作效率、个人素养、靠谱程度、技能熟练度四个维度。'),
      e('div',{className:'card',style:{margin:'8px 16px 0'}},
        ...WORKERS_RATED.map(w=>{
          const myR=workerRatings[w.id], rated=!!myR;
          return e('div',{key:w.id,className:'rc'},
            e('div',{className:'rc-hd'},
              e('div',{className:'rc-av',style:{background:w.color}},w.name[0]),
              e('div',{className:'rc-info'},
                e('div',{className:'rc-name'},w.name),
                e('div',{className:'rc-desc'},w.type),
                e('div',{style:{display:'flex',gap:5,alignItems:'center',marginTop:3}},
                  StarsDisplay({score:rated?parseFloat(avgD(myR.dims)):w.overall,size:12}),
                  e('span',{style:{fontSize:11,fontFamily:'DM Mono,monospace',fontWeight:700}},rated?avgD(myR.dims):w.overall)
                )
              ),
              e('button',{style:{background:rated?'var(--b)':'var(--r)',color:'#fff',border:'none',padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:700,flexShrink:0},onClick:()=>openRateWorker(w)},rated?'修改评价':'评价工人')
            ),
            rated?e('div',{style:{marginTop:8,padding:'8px 10px',background:'var(--s2)',borderRadius:7,border:'1px solid var(--bd)'}},
              e('div',{style:{fontSize:10,fontWeight:700,color:'var(--b)',marginBottom:5}},`📝 我的评价（${myR.date}）`),
              e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}},
                ...WORKER_DIMS.map(d=>e('div',{key:d.key,style:{fontSize:10,display:'flex',alignItems:'center',gap:3}},
                  d.icon,' ',e('span',{style:{color:'var(--sub)'}},`${d.label}：`),
                  e('span',{style:{fontWeight:700,color:'#f5a623'}},'★'.repeat(myR.dims[d.key]||0))

// In-memory user database (works in all WebView/APK environments)
// auth functions defined above

function getUsers() { return _MEM.users; }
function saveUsers(u) {
  _MEM.users = u;
  try { localStorage.setItem('__gj_users__', JSON.stringify(u)); } catch(e){}
}
function getCurrentUser() { return _MEM.current; }
function setCurrentUser(u) {
  _MEM.current = u;
  try { localStorage.setItem('__gj_current__', JSON.stringify(u)); } catch(e){}
}
function logout() {
  _MEM.current = null;
  try { localStorage.removeItem('__gj_current__'); } catch(e){}
}

/* ── REGISTER SCREEN ── */
function RegisterScreen({initRole, onBack, onDone}) {
  const [step, setStep] = useState(1); // 1=role, 2=info, 3=done
  const [role, setRole] = useState(initRole||'worker');
  const [form, setForm] = useState({name:'',phone:'',email:'',password:'',confirm:'',
    companyName:'',abn:''});
  const [err, setErr] = useState('');

  const setF = (k,v) => setForm(p=>({...p,[k]:v}));

  const goStep2 = () => { setErr(''); setStep(2); };

  const submit = () => {
    setErr('');
    if(role==='worker'){
      if(!form.name.trim()) return setErr('请填写姓名');
      if(!form.phone.trim()) return setErr('请填写手机号');
      if(!form.password || form.password.length < 6) return setErr('密码至少6位');
      if(form.password !== form.confirm) return setErr('两次密码不一致');
    } else {
      if(!form.companyName.trim()) return setErr('请填写公司名称');
      if(!form.phone.trim()) return setErr('请填写联系电话');
      if(!form.password || form.password.length < 6) return setErr('密码至少6位');
      if(form.password !== form.confirm) return setErr('两次密码不一致');
    }
    const users = getUsers();
    if(users.find(u=>u.phone===form.phone)) return setErr('该手机号已注册');
    const newUser = {
      id: Date.now(),
      role,
      phone: form.phone,
      password: form.password,
      name: role==='worker' ? form.name : form.companyName,
      email: form.email,
      abn: form.abn,
      createdAt: new Date().toISOString(),
      profile: role==='worker' ? {...DEFAULT_WORKER, name:form.name, phone:form.phone, email:form.email}
                                : {...DEFAULT_COMPANY, name:form.companyName, phone:form.phone},
    };
    users.push(newUser);
    saveUsers(users);
    setCurrentUser(newUser);
    setStep(3);
    setTimeout(()=>onDone(newUser), 1500);
  };

  const dots = [1,2,3].map((n,i)=>e('div',{key:n,className:`auth-dot ${step===n?'on':''}`}));

  return e('div',{className:'auth-wrap'},
    e('button',{className:'auth-back',onClick:step===1?onBack:()=>setStep(step-1)},
      '← '+(step===1?'返回':'上一步')),
    e('div',{className:'auth-step-dots'},...dots),

    step===1 && e('div',{className:'auth-card'},
      e('div',{className:'auth-title'},'选择注册身份'),
      e('div',{className:'auth-desc'},'请选择您的身份类型，注册后可在相应端使用全部功能'),
      e('div',{className:'role-cards'},
        e('div',{className:`role-card ${role==='worker'?'sel-w':''}`,onClick:()=>setRole('worker')},
          e('div',{className:'role-card-icon'},'👷'),
          e('div',{className:'role-card-name'},'工人注册'),
          e('div',{className:'role-card-desc'},'找工作·打卡·日志·信誉')
        ),
        e('div',{className:`role-card ${role==='company'?'sel-c':''}`,onClick:()=>setRole('company')},
          e('div',{className:'role-card-icon'},'🏢'),
          e('div',{className:'role-card-name'},'公司注册'),
          e('div',{className:'role-card-desc'},'招工·管理·任务·审查')
        )
      ),
      e('button',{className:`auth-btn ${role==='worker'?'auth-btn-w':'auth-btn-c'}`,onClick:goStep2},'下一步 →')
    ),

    step===2 && e('div',{className:'auth-card'},
      e('div',{className:'auth-title'},role==='worker'?'👷 工人注册':'🏢 公司注册'),
      e('div',{className:'auth-desc'},role==='worker'?'填写个人信息完成注册':'填写公司信息完成注册'),
      err && e('div',{className:'auth-err'},err),
      e('div',{className:'auth-form'},
        role==='worker'
          ? e('input',{className:'auth-input',placeholder:'真实姓名 *',value:form.name,onChange:ev=>setF('name',ev.target.value)})
          : e('input',{className:'auth-input',placeholder:'公司名称 *',value:form.companyName,onChange:ev=>setF('companyName',ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'手机号 *',type:'tel',value:form.phone,onChange:ev=>setF('phone',ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'邮箱（选填）',type:'email',value:form.email,onChange:ev=>setF('email',ev.target.value)}),
        role==='company' && e('input',{className:'auth-input',placeholder:'ABN / 营业执照号（选填）',value:form.abn,onChange:ev=>setF('abn',ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'设置密码（至少6位）*',type:'password',value:form.password,onChange:ev=>setF('password',ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'确认密码 *',type:'password',value:form.confirm,onChange:ev=>setF('confirm',ev.target.value)}),
        e('button',{className:`auth-btn ${role==='worker'?'auth-btn-w':'auth-btn-c'}`,onClick:submit},'完成注册')
      )
    ),

    step===3 && e('div',{className:'auth-card',style:{textAlign:'center'}},
      e('div',{style:{fontSize:48,marginBottom:12}},'🎉'),
      e('div',{className:'auth-title',style:{textAlign:'center',marginBottom:6}},'注册成功！'),
      e('div',{className:'auth-desc',style:{textAlign:'center'}},`欢迎加入工匠通，正在进入${role==='worker'?'工人':'公司'}端…`)
    )
  );
}

  const [phone, setPhone] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');

  const submit = () => {
    setErr('');
    if(!phone.trim()) return setErr('请填写手机号');
    if(!password) return setErr('请填写密码');
    const users = getUsers();
    const user = users.find(u=>u.phone===phone && u.password===password);
    if(!user) return setErr('手机号或密码错误');
    setCurrentUser(user);
    onDone(user);
  };

  // Demo login shortcut
  const demoLogin = (role) => {
    const users = getUsers();
    let demo = users.find(u=>u.phone===(role==='worker'?'demo_worker':'demo_company'));
    if(!demo){
      demo = {
        id: role==='worker'?-1:-2,
        role,
        phone: role==='worker'?'demo_worker':'demo_company',
        password:'demo',
        name: role==='worker'?'张建国':'Pacific Build Group',
        profile: role==='worker'?{...DEFAULT_WORKER}:{...DEFAULT_COMPANY},
      };
      users.push(demo);
      saveUsers(users);
    }
    setCurrentUser(demo);
    onDone(demo);
  };

  return e('div',{className:'auth-wrap'},
    e('button',{className:'auth-back',onClick:onBack},'← 返回'),
    e('div',{className:'auth-logo',style:{fontSize:36,marginBottom:4}},'工',e('b',null,'匠'),'通'),
    e('div',{className:'auth-sub',style:{marginBottom:24}},'登录账号'),
    e('div',{className:'auth-card'},
      e('div',{className:'auth-title'},'账号登录'),
      e('div',{className:'auth-desc'},'使用注册时的手机号和密码登录'),
      err && e('div',{className:'auth-err'},err),
      e('div',{className:'auth-form'},
        e('input',{className:'auth-input',placeholder:'手机号',type:'tel',value:phone,onChange:ev=>setPhone(ev.target.value)}),
        e('input',{className:'auth-input',placeholder:'密码',type:'password',value:password,onChange:ev=>setPassword(ev.target.value)}),
        e('button',{className:'auth-btn auth-btn-c',onClick:submit},'登录')
      ),
      e('div',{className:'auth-divider'},e('span',null,'快速体验')),
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
        e('button',{className:'auth-btn',style:{background:'#fff3ee',color:'var(--r)',fontSize:12},onClick:()=>demoLogin('worker')},'👷 工人演示'),
        e('button',{className:'auth-btn',style:{background:'#e8f0ff',color:'var(--b)',fontSize:12},onClick:()=>demoLogin('company')},'🏢 公司演示')
      )
    )
  );
}

        e('input',{className:'wf-in',placeholder:'邮箱',value:form.email||'',onChange:ev=>setF('email',ev.target.value)}),
        e('input',{className:'wf-in',placeholder:'住址',value:form.address||'',onChange:ev=>setF('address',ev.target.value)}),
        e('input',{className:'wf-in',placeholder:'紧急联系人（姓名 / 电话）',value:form.emergency||'',onChange:ev=>setF('emergency',ev.target.value)}),

        e('span',{className:'wf-label'},'工种 & 薪资'),
        e('select',{className:'wf-sel',value:form.type||'',onChange:ev=>setF('type',ev.target.value)},
          e('option',{value:''},'选择工种'),
          TYPE_OPTS.map(o=>e('option',{key:o},o))
        ),
        e('div',{className:'wf-row'},
          e('input',{className:'wf-in',placeholder:'时薪 A$',type:'number',value:form.pay||'',onChange:ev=>setF('pay',parseFloat(ev.target.value)||0)}),
          e('select',{className:'wf-sel',value:form.payUnit||'时',onChange:ev=>setF('payUnit',ev.target.value)},
            ['时','天','周'].map(o=>e('option',{key:o},o)))
        ),

        e('span',{className:'wf-label'},'入职 & 状态'),
        e('div',{className:'wf-row'},
          e('input',{className:'wf-in',type:'date',value:form.joined||'',onChange:ev=>setF('joined',ev.target.value)}),
          e('select',{className:'wf-sel',value:form.status||'probation',onChange:ev=>setF('status',ev.target.value)},
            STATUS_OPTS.map(s=>e('option',{key:s.key,value:s.key},s.label)))
        ),
        e('input',{className:'wf-in',placeholder:'ABN（选填）',value:form.abn||'',onChange:ev=>setF('abn',ev.target.value)}),
        e('input',{className:'wf-in',placeholder:'备注（证件、技能等）',value:form.notes||'',onChange:ev=>setF('notes',ev.target.value)}),

        e('button',{
          style:{width:'100%',padding:13,borderRadius:10,border:'none',background:'var(--b)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',marginTop:8,fontFamily:"'Noto Sans SC',sans-serif"},
          onClick:()=>{
            if(!form.name||!form.phone)return;
            if(isEdit){
              saveRoster(roster.map(w=>w.id===(selW&&selW.id)?{...w,...form}:w));
              setView('detail');
            } else {
              const nr = [...roster,{...form,id:Date.now()}];
              saveRoster(nr);
              setView('list');
            }
          }
        },isEdit?'保存修改':'添加工人')
      )
    );
  }

  return e('div',{className:'page'},e('div',{style:{padding:20}},'加载中…'));
}

/* Company job postings */
if(!_MEM.jobPosts) _MEM.jobPosts = [
  {id:1,title:'电工招募',types:['电工'],pay:48,payUnit:'时',city:'悉尼',headcount:2,desc:'恒大龙湾项目，需持白卡',status:'open',createdAt:'2024-03-01'},
  {id:2,title:'钢筋工/水泥工',types:['钢筋工','水泥工'],pay:44,payUnit:'时',city:'墨尔本',headcount:3,desc:'绿地项目长期合作',status:'open',createdAt:'2024-03-05'},

function RecruitPage() {
  const TASK_TYPES = ['做墙铁','做顶铁','Tbar','做木板','做外墙铁','做外墙板','打胶','铺棉','钉板','抹灰','蹭灰','杂工','管工','电工','水泥工','钢筋工','木工'];
  const CITIES = ['悉尼','墨尔本','布里斯班','珀斯','阿德莱德','堪培拉'];

  const [posts, setPosts] = useState(()=>_MEM.jobPosts||[]);
  const [apps, setApps] = useState(()=>_MEM.applications||[]);
  const [view, setView] = useState('list'); // list | addPost | appList
  const [selPost, setSelPost] = useState(null);
  const [form, setForm] = useState({title:'',types:[],pay:'',payUnit:'时',city:'悉尼',headcount:1,desc:'',status:'open'});

  const savePosts = (p)=>{ _MEM.jobPosts=p; _saveJobPosts(); setPosts(p); };
  const refreshApps = ()=>{ setApps([..._MEM.applications||[]]); };
  const setF = (k,v)=>setForm(p=>({...p,[k]:v}));
  const toggleType = (t)=>setForm(p=>({...p,types:p.types.includes(t)?p.types.filter(x=>x!==t):[...p.types,t]}));

  const pendingCount = (apps||[]).filter(a=>a.status==='pending').length;

  const RCSS = `
.rc-tabs{display:flex;border-bottom:1px solid var(--bd);margin:0 16px}
.rc-tab{flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;font-family:'Noto Sans SC',sans-serif}
.rc-tab.on{color:var(--b);border-bottom-color:var(--b)}
.rc-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--r);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;margin-left:4px}
.rc-list{padding:0 16px 20px}
.rc-add-btn{width:100%;padding:12px;border-radius:10px;border:2px dashed var(--bd2);background:var(--s2);color:var(--b);font-size:13px;font-weight:700;cursor:pointer;margin:12px 0 0;font-family:'Noto Sans SC',sans-serif}
.rc-card{background:var(--sur);border-radius:12px;border:1px solid var(--bd);margin-top:10px;overflow:hidden;box-shadow:var(--sh)}
.rc-card-hd{padding:13px 14px}
.rc-card-title{font-size:14px;font-weight:900;margin-bottom:4px}
.rc-card-meta{font-size:11px;color:var(--sub);display:flex;gap:10px;flex-wrap:wrap}
.rc-card-pay{font-size:13px;font-weight:700;color:var(--g);font-family:'DM Mono',monospace;margin-top:6px}
.rc-card-desc{font-size:11px;color:var(--sub);margin-top:5px;line-height:1.5}
.rc-card-ft{display:flex;padding:9px 14px;border-top:1px solid var(--bd);background:var(--s2);gap:6px;align-items:center}
.rc-status{font-size:10px;padding:3px 9px;border-radius:12px;font-weight:700}
.rcs-open{background:#e8f5ee;color:var(--g)}.rcs-closed{background:var(--s3);color:var(--sub)}
.app-card{background:var(--sur);border-radius:12px;border:1px solid var(--bd);margin-top:10px;overflow:hidden;box-shadow:var(--sh)}
.app-hd{display:flex;align-items:center;gap:12px;padding:13px 14px}
.app-av{width:40px;height:40px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;flex-shrink:0}
.app-info{flex:1}
.app-name{font-size:13px;font-weight:700}
.app-sub{font-size:11px;color:var(--sub);margin-top:2px}
.app-actions{display:flex;border-top:1px solid var(--bd)}
.app-accept{flex:1;padding:11px;border:none;background:#e8f5ee;color:var(--g);font-size:12px;font-weight:700;cursor:pointer;border-right:1px solid var(--bd);font-family:'Noto Sans SC',sans-serif}
.app-reject{flex:1;padding:11px;border:none;background:#fff0ec;color:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.pf-in2{width:100%;padding:9px 11px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;font-size:13px;color:var(--tx);outline:none;margin-bottom:8px;display:block;font-family:'Noto Sans SC',sans-serif}
.pf-sel2{width:100%;padding:9px 11px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;font-size:12px;color:var(--tx);outline:none;margin-bottom:8px;font-family:'Noto Sans SC',sans-serif}
.pf-label2{font-size:11px;font-weight:700;color:var(--sub);margin:6px 0 5px;display:block}
.chip-sm{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bd2);margin:3px}
  `;

  const [rcTab, setRcTab] = useState('posts');

  if(view==='addPost') return e('div',{className:'page'},
    e('style',null,RCSS),
    e('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'14px 16px 0'}},
      e('button',{style:{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--sub)'},onClick:()=>setView('list')},'←'),
      e('div',{style:{fontSize:16,fontWeight:900}},'发布招聘')
    ),
    e('div',{style:{padding:'0 16px 30px'}},
      e('span',{className:'pf-label2'},'职位名称 *'),
      e('input',{className:'pf-in2',placeholder:'如：电工招募',value:form.title,onChange:ev=>setF('title',ev.target.value)}),
      e('span',{className:'pf-label2'},'所需工种（多选）'),
      e('div',{style:{display:'flex',flexWrap:'wrap',marginBottom:10}},
        TASK_TYPES.map(t=>e('span',{key:t,className:'chip-sm',onClick:()=>toggleType(t),
          style:{background:form.types.includes(t)?'var(--b)':'var(--s3)',color:form.types.includes(t)?'#fff':'var(--sub)',
                 border:'1px solid '+(form.types.includes(t)?'var(--b)':'var(--bd2)')}},t))
      ),
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
        e('div',null,
          e('span',{className:'pf-label2'},'时薪 A$ *'),
          e('input',{className:'pf-in2',type:'number',placeholder:'如：45',value:form.pay,onChange:ev=>setF('pay',ev.target.value)})
        ),
        e('div',null,
          e('span',{className:'pf-label2'},'结算方式'),
          e('select',{className:'pf-sel2',value:form.payUnit,onChange:ev=>setF('payUnit',ev.target.value)},
            ['时','天','周'].map(o=>e('option',{key:o},o)))
        )
      ),
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
        e('div',null,
          e('span',{className:'pf-label2'},'城市'),
          e('select',{className:'pf-sel2',value:form.city,onChange:ev=>setF('city',ev.target.value)},
            CITIES.map(c=>e('option',{key:c},c)))
        ),
        e('div',null,
          e('span',{className:'pf-label2'},'招募人数'),
          e('input',{className:'pf-in2',type:'number',min:1,value:form.headcount,onChange:ev=>setF('headcount',parseInt(ev.target.value)||1)})
        )
      ),
      e('span',{className:'pf-label2'},'职位描述'),
      e('textarea',{className:'pf-in2',style:{minHeight:72,resize:'none',outline:'none'},placeholder:'项目信息、要求、福利…',value:form.desc,onChange:ev=>setF('desc',ev.target.value)}),
      e('button',{
        style:{width:'100%',padding:13,borderRadius:10,border:'none',background:'var(--b)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif"},
        onClick:()=>{
          if(!form.title||!form.pay)return;
          var np={id:Date.now(),...form,createdAt:new Date().toISOString().slice(0,10)};
          savePosts([...posts,np]);setView('list');
        }
      },'发布职位')
    )
  );

  return e('div',{className:'page'},
    e('style',null,RCSS),
    e('div',{className:'rc-tabs'},
      e('button',{className:'rc-tab '+(rcTab==='posts'?'on':''),onClick:()=>setRcTab('posts')},'📋 职位管理'),
      e('button',{className:'rc-tab '+(rcTab==='apps'?'on':''),onClick:()=>{setRcTab('apps');refreshApps();}},
        '📥 申请审核',
        pendingCount>0&&e('span',{className:'rc-badge'},pendingCount)
      )
    ),

    rcTab==='posts'&&e('div',{className:'rc-list'},
      e('button',{className:'rc-add-btn',onClick:()=>{
        setForm({title:'',types:[],pay:'',payUnit:'时',city:'悉尼',headcount:1,desc:'',status:'open'});
        setView('addPost');
      }},'＋ 发布新职位'),
      posts.length===0&&e('div',{style:{textAlign:'center',padding:'30px 0',color:'var(--sub)',fontSize:13}},'暂无职位，点击上方发布'),
      posts.map(p=>e('div',{key:p.id,className:'rc-card'},
        e('div',{className:'rc-card-hd'},
          e('div',{className:'rc-card-title'},p.title),
          e('div',{className:'rc-card-meta'},
            e('span',null,'📍 '+p.city),
            e('span',null,'👷 需 '+p.headcount+' 人'),
            e('span',null,'📅 '+p.createdAt)
          ),
          e('div',{className:'rc-card-pay'},'A$ '+p.pay+' / '+p.payUnit),
          p.desc&&e('div',{className:'rc-card-desc'},p.desc)
        ),
        e('div',{className:'rc-card-ft'},
          e('span',{className:'rc-status '+(p.status==='open'?'rcs-open':'rcs-closed')},p.status==='open'?'招募中':'已关闭'),
          e('span',{style:{fontSize:11,color:'var(--sub)',flex:1,marginLeft:8}},
            (apps||[]).filter(a=>a.jobId===p.id&&a.status==='pending').length+' 人待审'),
          e('button',{style:{padding:'5px 10px',borderRadius:6,border:'none',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif",
            background:p.status==='open'?'#fff0ec':'#e8f5ee',color:p.status==='open'?'var(--r)':'var(--g)'},
            onClick:()=>savePosts(posts.map(x=>x.id===p.id?{...x,status:x.status==='open'?'closed':'open'}:x))},
            p.status==='open'?'关闭':'重开'),
          e('button',{style:{padding:'5px 10px',borderRadius:6,border:'none',background:'#fff0ec',color:'var(--r)',fontSize:11,fontWeight:700,cursor:'pointer',marginLeft:6,fontFamily:"'Noto Sans SC',sans-serif"},
            onClick:()=>savePosts(posts.filter(x=>x.id!==p.id))},'删除')
        )
      ))
    ),

    rcTab==='apps'&&e('div',{className:'rc-list'},
      (apps||[]).filter(a=>a.status==='pending').length===0
        &&e('div',{style:{textAlign:'center',padding:'30px 0',color:'var(--sub)'}},
          e('div',{style:{fontSize:36,marginBottom:8}},'📭'),
          e('div',{style:{fontSize:13}},'暂无待审核申请')
        ),
      (apps||[]).filter(a=>a.status==='pending').map(a=>e('div',{key:a.id,className:'app-card'},
        e('div',{className:'app-hd'},
          e('div',{className:'app-av',style:{background:'#f5a623'}},a.workerName[0]),
          e('div',{className:'app-info'},
            e('div',{className:'app-name'},a.workerName),
            e('div',{className:'app-sub'},'申请：'+a.jobTitle+' · '+a.appliedAt),
            a.workerPhone&&e('div',{className:'app-sub'},'📱 '+a.workerPhone),
            a.workerType&&e('div',{className:'app-sub'},'🔧 '+a.workerType)
          )
        ),
        e('div',{className:'app-actions'},
          e('button',{className:'app-accept',
            onClick:()=>{
              /* Accept: add to roster */
              if(!_MEM.roster)_MEM.roster=[];
              var already=_MEM.roster.some(w=>w.phone===a.workerPhone||w.name===a.workerName);
              if(!already){
                _MEM.roster.push({
                  id:Date.now(),name:a.workerName,phone:a.workerPhone||'',
                  email:a.workerEmail||'',type:a.workerType||'杂工',
                  status:'probation',pay:40,payUnit:'时',
                  joined:new Date().toISOString().slice(0,10),
                  abn:'',address:'',emergency:'',notes:'',gender:'',age:''
                });
                _saveRoster();
              }
              _MEM.applications=(_MEM.applications||[]).map(x=>x.id===a.id?{...x,status:'accepted'}:x);
              _saveApps();
              refreshApps();
            }
          },'✅ 录取 → 加入工人管理'),
          e('button',{className:'app-reject',
            onClick:()=>{
              _MEM.applications=(_MEM.applications||[]).map(x=>x.id===a.id?{...x,status:'rejected'}:x);
              _saveApps();
              refreshApps();
            }
          },'❌ 拒绝')
        )
      ))
    )
  );
}

/* ════════════════════════════
   APP ROOT
════════════════════════════ */
const TABS_WORKER = [
  {key:'match',icon:'🎯',label:'找工作'},
  {key:'checkin',icon:'📍',label:'签到'},
  {key:'diary',icon:'📝',label:'日志'},
  {key:'rating',icon:'⭐',label:'信誉'},
  {key:'profile',icon:'👤',label:'我的'},
];
const TABS_COMPANY = [
  {key:'checkin',icon:'📍',label:'工人位置'},
  {key:'diary',icon:'📝',label:'项目管理'},
  {key:'recruit',icon:'📋',label:'招聘'},
  {key:'workers',icon:'👷',label:'工人管理'},
  {key:'rating',icon:'⭐',label:'信誉'},
  {key:'profile',icon:'👤',label:'公司资料'},
];

function App() {
  // Auth state
  const [authUser, setAuthUser] = useState(()=>{
    try { return getCurrentUser(); } catch(e){ return null; }
  });
  const [authScreen, setAuthScreen] = useState('welcome'); // welcome|login|register
  const [initRole, setInitRole] = useState(null);

  // App state
  const [tab, setTab] = useState('match');
  const [workerProfile, setWorkerProfile] = useState(DEFAULT_WORKER);
  const [companyProfile, setCompanyProfile] = useState(DEFAULT_COMPANY);

  useEffect(() => {
    const splash = document.getElementById('splash');
    if(splash) {
      splash.style.opacity = '0';
      setTimeout(() => { if(splash.parentNode) splash.parentNode.removeChild(splash); }, 400);
    }
  }, []);

  // Sync profile from auth user
  useEffect(()=>{
    if(authUser){
      if(authUser.role==='worker' && authUser.profile) setWorkerProfile(authUser.profile);
      if(authUser.role==='company' && authUser.profile) setCompanyProfile(authUser.profile);
      // Set default tab based on role
      setTab(authUser.role==='company' ? 'checkin' : 'match');
    }
  },[authUser]);

  const handleAuthDone = (user) => {
    setAuthUser(user);
  };

  const handleLogout = () => {
    logout();
    setAuthUser(null);
    setAuthScreen('welcome');
    setTab('match');
  };

  // Save profile changes back to user record
  const handleSetWorkerProfile = (p) => {
    setWorkerProfile(p);
    if(authUser){ const u={...authUser,profile:p}; setCurrentUser(u); setAuthUser(u); }
  };
  const handleSetCompanyProfile = (p) => {
    setCompanyProfile(p);
    if(authUser){ const u={...authUser,profile:p}; setCurrentUser(u); setAuthUser(u); }
  };

  // ── AUTH SCREENS ──
  if(!authUser) {
    if(authScreen==='welcome') return e('div',null,
      e('style',null,AUTH_CSS),
      e(WelcomeScreen,{
        onLogin:()=>setAuthScreen('login'),
        onRegister:(r)=>{setInitRole(r);setAuthScreen('register');}
      })
    );
    if(authScreen==='login') return e('div',null,
      e('style',null,AUTH_CSS),
      e(LoginScreen,{
        onBack:()=>setAuthScreen('welcome'),
        onDone:handleAuthDone
      })
    );
    if(authScreen==='register') return e('div',null,
      e('style',null,AUTH_CSS),
      e(RegisterScreen,{
        initRole,
        onBack:()=>setAuthScreen('welcome'),
        onDone:handleAuthDone
      })
    );
    return e('div',null,e('style',null,AUTH_CSS),e(WelcomeScreen,{
      onLogin:()=>setAuthScreen('login'),
      onRegister:(r)=>{setInitRole(r);setAuthScreen('register');}
    }));
  }

  // ── MAIN APP ──
  if(!authUser) return e('div',null,e('style',null,AUTH_CSS),e(WelcomeScreen,{onLogin:()=>setAuthScreen('login'),onRegister:(r)=>{setInitRole(r);setAuthScreen('register');}}));
  const role = authUser ? authUser.role : 'worker';
  const isWorker = role === 'worker';
  const TABS = isWorker ? TABS_WORKER : TABS_COMPANY;

  // Ensure tab is valid for current role
  const validTab = TABS.find(t=>t.key===tab) ? tab : TABS[0].key;

  const pages = {
    match:   e(MatchPage,   {profile:workerProfile, onGoProfile:()=>setTab('profile')}),
    checkin: e(CheckinPage, {role, authUser}),
    diary:   e(DiaryPage,   {role}),
    recruit: e(RecruitPage, {}),
    workers: e(WorkerMgmtPage, {}),
    rating:  e(RatingPage,  {role}),
    profile: e(ProfilePage, {
      profile:workerProfile, setProfile:handleSetWorkerProfile,
      companyProfile, setCompanyProfile:handleSetCompanyProfile,
      role, setRole:()=>{},
      onLogout:handleLogout,
      authUser,
    }),
  };

  const avatarName = (authUser&&authUser.name?authUser.name:'我')[0];

  return e('div', {className:'app'},
    e('style', null, CSS),
    e('style', null, AUTH_CSS),
    e('div', {className:'topbar'},
      e('div', null,
        e('div', {className:'logo'}, '工', e('span',{className:'logo-r'},'匠'), '通'),
        e('div', {className:'logo-sub'}, isWorker?'工人端 — 找工作·签到·日志':'公司端 — 管理·任务·招工')
      ),
      e('div', {className:'topbar-right'},
        e('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1}},
          e('div',{className:`role-pill ${isWorker?'rp-w':'rp-c'}`,style:{cursor:'default'}},
            isWorker?'👷 工人':'🏢 公司'),
          e('div',{style:{fontSize:9,color:'var(--sub)',maxWidth:80,textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
            authUser.name)
        ),
        e('div',{className:'avatar',style:{background:isWorker?'#d4420a':'#1a4a8c',cursor:'pointer'},
          onClick:()=>setTab('profile')},avatarName)
      )
    ),
    pages[validTab],
    e('div', {className:'bottom-nav'},
      ...TABS.map(t =>
        e('button', {key:t.key, className:`nb ${validTab===t.key?'on':''}`, onClick:()=>setTab(t.key)},
          e('span', {className:'nb-icon'}, t.icon),
          t.label
        )
      )
    )
  );
}

// Global error handler to prevent black screen
window.addEventListener('error', function(ev){
  console.error('App error:', ev.error);
});
window.addEventListener('unhandledrejection', function(ev){
  console.error('Unhandled promise:', ev.reason);
});
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
